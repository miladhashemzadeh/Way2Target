<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>W2T Appraise Goal (Redesigned)</title>
    <style>
        :root {
            --bg: oklch(95% 0.005 240);
            --surface: oklch(100% 0 0);
            --fg: oklch(20% 0.02 240);
            --muted: oklch(50% 0.018 240);
            --border: oklch(90% 0.006 240);
            --accent: oklch(35% 0.22 290);
            --success: oklch(55% 0.15 140);
            --challenge: oklch(65% 0.18 55);
            --failed: oklch(70% 0.18 25);

            --glass-bg-base: rgba(255, 255, 255, 0.15);
            --glass-border-color: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --glass-glow: 0 0 20px oklch(35% 0.22 290 / 0.1);

            --mood-high-energy-start: oklch(75% 0.15 260);
            --mood-high-energy-end: oklch(80% 0.12 280);
            --mood-focused-start: oklch(70% 0.18 160);
            --mood-focused-end: oklch(75% 0.15 180);

            --font-display: 'Inter', system-ui, sans-serif;
            --font-body: 'Inter', system-ui, sans-serif;

            --card-radius: 24px;
            --button-radius: 999px;
            --input-radius: 16px;
        }

        body.dark-theme {
            --bg: oklch(10% 0.02 260);
            --surface: oklch(15% 0.03 260);
            --fg: oklch(90% 0.01 240);
            --muted: oklch(60% 0.01 240);
            --border: oklch(20% 0.02 260);
            --accent: oklch(70% 0.2 290);
            --success: oklch(65% 0.18 140);
            --challenge: oklch(75% 0.2 55);
            --failed: oklch(80% 0.2 25);

            --glass-bg-base: rgba(255, 255, 255, 0.05);
            --glass-border-color: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --glass-glow: 0 0 20px oklch(70% 0.2 290 / 0.3);

            --mood-high-energy-start: oklch(65% 0.18 260);
            --mood-high-energy-end: oklch(70% 0.15 280);
            --mood-focused-start: oklch(60% 0.2 160);
            --mood-focused-end: oklch(65% 0.18 180);
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--fg);
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100vh;
            overflow-y: auto;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .header-bar {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }
        .header-bar .back-button {
            background: var(--glass-bg-base);
            border: 1px solid var(--glass-border-color);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            font-size: 1.2rem;
            color: var(--fg);
            cursor: pointer;
            box-shadow: var(--glass-shadow);
        }
        .header-bar h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 0 16px;
            color: var(--fg);
        }
        .master-goal-subtitle {
            font-size: 1rem;
            color: var(--muted);
            margin-top: -10px;
            margin-left: 56px;
        }

        .glass-card {
            background: var(--glass-bg-base);
            border: 1px solid var(--glass-border-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--card-radius);
            box-shadow: var(--glass-shadow), var(--glass-glow);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.3s ease-out;
        }
        .glass-card:hover {
            box-shadow: var(--glass-shadow), 0 0 30px var(--accent);
        }
        .section-title {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--fg);
        }

        .goal-summary {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        .goal-summary h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
            color: var(--fg);
        }
        .goal-summary p {
            font-size: 0.9rem;
            color: var(--muted);
            margin: 0;
        }
        .goal-summary .progress-bar-container {
            height: 8px;
            background: var(--border);
            border-radius: 999px;
            overflow: hidden;
            margin-top: 4px;
        }
        .goal-summary .progress-bar {
            height: 100%;
            width: 70%;
            background: var(--accent);
            border-radius: 999px;
        }
        .goal-summary .progress-text {
            font-size: 0.85rem;
            color: var(--accent);
            margin-top: 4px;
            align-self: flex-end;
        }

        .reflection-textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: var(--input-radius);
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--fg);
            background: var(--surface);
            box-sizing: border-box;
            min-height: 120px;
            resize: vertical;
            transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }
        .reflection-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px oklch(var(--accent) / 0.2);
            background: var(--surface);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .action-buttons button {
            flex: 1;
            border-radius: var(--button-radius);
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }
        .action-buttons .complete-button {
            background: var(--success);
            color: var(--surface);
            box-shadow: 0 8px 24px oklch(var(--success) / 0.4);
        }
        .action-buttons .complete-button:hover {
            background: oklch(var(--success) / 1.1);
            box-shadow: 0 10px 28px oklch(var(--success) / 0.5);
        }
        .action-buttons .archive-button {
            background: var(--surface);
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .action-buttons .archive-button:hover {
            background: var(--bg);
        }

        /* Status Chips */
        .status-chip {
            border-radius: var(--button-radius);
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--surface);
        }
        .status-chip.ongoing { background: var(--challenge); }
        .status-chip.finished { background: var(--success); }
        .status-chip.failed { background: var(--failed); }
    </style>
</head>
<body>
    <div class="header-bar">
        <button class="back-button">←</button>
        <h1>Appraise Goal</h1>
    </div>
    <p class="master-goal-subtitle">"Learn Programming"</p>

    <div class="glass-card">
        <h2 class="section-title">Goal Summary</h2>
        <div class="goal-summary">
            <h3>Learn Programming</h3>
            <div class="progress-bar-container">
                <div class="progress-bar" style="width: 70%;"></div>
            </div>
            <span class="progress-text">70% Complete</span>
            <p>You've made significant progress in Python basics and are now tackling data structures. Challenges encountered have been mostly resolved. Keep up the momentum!</p>
        </div>
    </div>

    <div class="glass-card">
        <h2 class="section-title">Your Reflection</h2>
        <textarea class="reflection-textarea" placeholder="What did you learn? What went well or poorly?"></textarea>
    </div>

    <div class="action-buttons">
        <button class="complete-button">Mark as Complete</button>
        <button class="archive-button">Archive Goal</button>
    </div>
</body>
</html>
